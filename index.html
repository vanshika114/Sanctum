<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SANCTUM — No Distraction Zone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Meow+Script&family=Felipa&family=Annie+Use+Your+Telescope&family=Cabin+Sketch:wght@400;700&family=Foldit:wght@300;400;600&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>

/* ══════════════════════════════════════════
   DARK THEME
══════════════════════════════════════════ */
[data-theme="dark"] {
  --bg-void:      #07070f;
  --bg-deep:      #0b0b16;
  --bg-card:      #10101e;
  --bg-raised:    #161628;
  --accent:       #c8813a;
  --accent-glow:  rgba(200,129,58,0.15);
  --accent-green: #4e9e78;
  --accent-red:   #9e4e4e;
  --text-bright:  #ede8df;
  --text-mid:     #9d96a8;
  --text-dim:     #4e4a5a;
  --border:       rgba(255,255,255,0.06);
  --border-accent:rgba(200,129,58,0.28);
  --ring-bg:      #161628;
  --noise-op:     0.025;
  --radial-1:     rgba(200,129,58,0.08);
  --radial-2:     rgba(78,158,120,0.05);
  --grad-line:    rgba(200,129,58,0.32);
  --shadow-card:  0 4px 32px rgba(0,0,0,0.5);
}

/* ══════════════════════════════════════════
   LIGHT THEME  –  #FFF8F0 · #C08552 · #8C5A3C · #4B2E2B
══════════════════════════════════════════ */
[data-theme="light"] {
  --bg-void:      #FFF8F0;
  --bg-deep:      #F5EAD8;
  --bg-card:      #FFFCF8;
  --bg-raised:    #EDD9C0;
  --accent:       #C08552;
  --accent-glow:  rgba(192,133,82,0.14);
  --accent-green: #3d7a56;
  --accent-red:   #8b3030;
  --text-bright:  #4B2E2B;
  --text-mid:     #8C5A3C;
  --text-dim:     #C09070;
  --border:       rgba(75,46,43,0.1);
  --border-accent:rgba(192,133,82,0.38);
  --ring-bg:      #E8D4BC;
  --noise-op:     0.010;
  --radial-1:     rgba(192,133,82,0.10);
  --radial-2:     rgba(140,90,60,0.06);
  --grad-line:    rgba(192,133,82,0.40);
  --shadow-card:  0 4px 24px rgba(75,46,43,0.08);
}

/* ══════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg-void);
  color: var(--text-bright);
  font-family: 'Annie Use Your Telescope', cursive;
  font-size: 15px;
  overflow-x: hidden;
  transition: background 0.45s, color 0.45s;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 50% -10%, var(--radial-1) 0%, transparent 70%),
    radial-gradient(ellipse 40% 40% at 85% 80%,  var(--radial-2) 0%, transparent 60%);
  pointer-events: none; z-index: 0; transition: background 0.45s;
}

body::after {
  content: '';
  position: fixed; inset: 0;
  opacity: var(--noise-op);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 200px; pointer-events: none; z-index: 0;
}

/* ══════════════════════════════════════════
   HEADER
══════════════════════════════════════════ */
header {
  position: relative; z-index: 10;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 36px;
  border-bottom: 1px solid var(--border);
  transition: border-color 0.45s;
}

.logo {
  font-family: 'Meow Script', cursive;
  font-size: 34px;
  color: var(--text-bright);
  letter-spacing: 0.04em;
  line-height: 1;
  transition: color 0.45s;
}
.logo span { color: var(--accent); }

.header-right {
  display: flex; align-items: center; gap: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px; color: var(--text-dim); letter-spacing: 0.08em;
}
#live-clock { color: var(--text-mid); }

/* ── Theme Toggle ── */
.theme-toggle {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-raised);
  border: 1px solid var(--border);
  border-radius: 40px; padding: 5px 14px 5px 10px;
  cursor: pointer; transition: all 0.25s;
  color: var(--text-mid);
  font-family: 'Annie Use Your Telescope', cursive;
  font-size: 13px; letter-spacing: 0.06em;
}
.theme-toggle:hover { border-color: var(--border-accent); color: var(--accent); }

.toggle-track {
  width: 32px; height: 18px;
  background: var(--bg-deep);
  border: 1px solid var(--border-accent);
  border-radius: 20px; position: relative;
  transition: background 0.3s; flex-shrink: 0;
}
[data-theme="light"] .toggle-track { background: var(--accent-glow); }

.toggle-thumb {
  position: absolute; top: 2px; left: 2px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--accent);
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
[data-theme="light"] .toggle-thumb { transform: translateX(14px); }
[data-theme="light"] .lbl-dark  { display: none; }
[data-theme="dark"]  .lbl-light { display: none; }

/* ══════════════════════════════════════════
   MAIN GRID
══════════════════════════════════════════ */
.app-grid {
  position: relative; z-index: 10;
  display: grid; grid-template-columns: 330px 1fr 330px;
  gap: 20px; padding: 24px 28px;
  max-width: 1440px; margin: 0 auto;
  min-height: calc(100vh - 68px); align-items: start;
}

/* ══════════════════════════════════════════
   CARD
══════════════════════════════════════════ */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 18px; padding: 24px;
  position: relative; overflow: hidden;
  box-shadow: var(--shadow-card);
  transition: background 0.45s, border-color 0.45s, box-shadow 0.45s;
}
.card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--grad-line), transparent);
}

/* Card titles — Cabin Sketch, bigger */
.card-title {
  font-family: 'Cabin Sketch', cursive;
  font-size: 18px; font-weight: 700;
  letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--accent); margin-bottom: 22px;
  display: flex; align-items: center; gap: 10px;
  transition: color 0.45s;
}
.card-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ══════════════════════════════════════════
   POMODORO TIMER
══════════════════════════════════════════ */
.timer-card { grid-column: 2; display: flex; flex-direction: column; align-items: center; }

.timer-modes {
  display: flex; gap: 6px; margin-bottom: 30px;
  background: var(--bg-deep); padding: 5px; border-radius: 50px;
  border: 1px solid var(--border); transition: background 0.45s, border-color 0.45s;
}
.mode-btn {
  padding: 7px 20px; border-radius: 40px; border: none;
  background: transparent; color: var(--text-dim);
  font-family: 'Annie Use Your Telescope', cursive;
  font-size: 14px; cursor: pointer; transition: all 0.25s; white-space: nowrap;
}
.mode-btn.active {
  background: var(--bg-raised); color: var(--accent);
  border: 1px solid var(--border-accent);
}

.timer-ring-wrapper {
  position: relative; width: 264px; height: 264px; margin: 0 auto 30px;
}
.timer-ring-svg { position: absolute; inset: 0; transform: rotate(-90deg); }
.ring-bg   { fill: none; stroke: var(--ring-bg); stroke-width: 7; transition: stroke 0.45s; }
.ring-progress {
  fill: none; stroke: var(--accent); stroke-width: 7; stroke-linecap: round;
  filter: drop-shadow(0 0 9px rgba(200,129,58,0.55));
  transition: stroke-dashoffset 1s linear, stroke 0.5s;
}
[data-theme="light"] .ring-progress { filter: drop-shadow(0 0 8px rgba(192,133,82,0.5)); }
.ring-progress.break-mode { stroke: var(--accent-green); filter: drop-shadow(0 0 9px rgba(61,122,86,0.55)); }

.timer-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}

/* Timer digits — Foldit */
.timer-display {
  font-family: 'Foldit', cursive;
  font-size: 70px; font-weight: 300; line-height: 1; letter-spacing: 0.01em;
  color: var(--text-bright); transition: color 0.45s;
}
.timer-label {
  font-family: 'Annie Use Your Telescope', cursive;
  font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--text-dim); margin-top: 8px; transition: color 0.45s;
}
.session-dots { display: flex; gap: 6px; margin-top: 10px; }
.session-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); transition: background 0.3s; }
.session-dot.done { background: var(--accent); }

.timer-controls { display: flex; gap: 12px; margin-bottom: 28px; }
.btn-icon {
  width: 46px; height: 46px; border-radius: 50%;
  border: 1px solid var(--border); background: var(--bg-raised);
  color: var(--text-mid); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.btn-icon:hover { border-color: var(--border-accent); color: var(--accent); }

.btn-main {
  width: 66px; height: 66px; border-radius: 50%; border: none;
  background: var(--accent); color: #fff; font-size: 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; box-shadow: 0 0 28px var(--accent-glow);
}
.btn-main:hover { transform: scale(1.08); }

.timer-settings { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; width: 100%; }
.setting-box {
  background: var(--bg-deep); border: 1px solid var(--border);
  border-radius: 12px; padding: 13px; text-align: center;
  transition: border-color 0.2s, background 0.45s;
}
.setting-box:hover { border-color: var(--border-accent); }
.setting-label {
  font-family: 'Annie Use Your Telescope', cursive;
  font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-dim); margin-bottom: 6px; transition: color 0.45s;
}
.setting-value {
  font-family: 'Foldit', cursive;
  font-size: 26px; font-weight: 300; color: var(--text-bright); transition: color 0.45s;
}
.setting-controls { display: flex; justify-content: center; gap: 8px; margin-top: 7px; }
.adj-btn {
  width: 22px; height: 22px; border-radius: 5px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-mid); font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.adj-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ══════════════════════════════════════════
   TODO LIST
══════════════════════════════════════════ */
.todo-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
.todo-input {
  flex: 1; background: var(--bg-deep); border: 1px solid var(--border);
  border-radius: 11px; padding: 10px 14px;
  color: var(--text-bright); font-family: 'Annie Use Your Telescope', cursive; font-size: 14px;
  outline: none; transition: border-color 0.2s, background 0.45s, color 0.45s;
}
.todo-input:focus { border-color: var(--border-accent); }
.todo-input::placeholder { color: var(--text-dim); }

.add-btn {
  width: 40px; height: 40px; flex-shrink: 0; border-radius: 11px;
  border: 1px solid var(--border-accent); background: var(--accent-glow);
  color: var(--accent); font-size: 22px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.add-btn:hover { background: var(--accent); color: #fff; }

.todo-filters { display: flex; gap: 4px; margin-bottom: 14px; }
.filter-btn {
  padding: 4px 13px; border-radius: 20px; border: 1px solid transparent;
  background: transparent; color: var(--text-dim);
  font-family: 'Annie Use Your Telescope', cursive; font-size: 13px; cursor: pointer; transition: all 0.2s;
}
.filter-btn.active { border-color: var(--border-accent); color: var(--accent); background: var(--accent-glow); }

.todo-list { display: flex; flex-direction: column; gap: 8px; max-height: 340px; overflow-y: auto; padding-right: 4px; }
.todo-list::-webkit-scrollbar { width: 3px; }
.todo-list::-webkit-scrollbar-thumb { background: var(--bg-raised); border-radius: 2px; }

.todo-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 13px; background: var(--bg-deep);
  border: 1px solid var(--border); border-radius: 11px;
  transition: border-color 0.2s, background 0.45s;
  animation: slideIn 0.25s ease;
}
@keyframes slideIn { from { opacity:0; transform:translateX(-8px); } to { opacity:1; transform:translateX(0); } }
.todo-item:hover { border-color: var(--border-accent); }
.todo-item.done { opacity: 0.45; }

.todo-check {
  width: 19px; height: 19px; border-radius: 6px;
  border: 1.5px solid var(--text-dim); background: transparent;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; font-size: 11px;
}
.todo-check.checked { background: var(--accent-green); border-color: var(--accent-green); color: #fff; }

.todo-text {
  flex: 1; font-family: 'Annie Use Your Telescope', cursive;
  font-size: 14px; color: var(--text-mid); line-height: 1.4; transition: color 0.45s;
}
.todo-item.done .todo-text { text-decoration: line-through; }

.todo-del {
  opacity: 0; background: transparent; border: none;
  color: var(--accent-red); cursor: pointer; font-size: 14px; padding: 2px 4px; transition: opacity 0.2s;
}
.todo-item:hover .todo-del { opacity: 1; }

.todo-stats {
  margin-top: 14px; font-family: 'Annie Use Your Telescope', cursive;
  font-size: 13px; color: var(--text-dim); display: flex; justify-content: space-between;
}
.clear-done {
  background: none; border: none; color: var(--text-dim);
  font-family: 'Annie Use Your Telescope', cursive; font-size: 13px; cursor: pointer; transition: color 0.2s;
}
.clear-done:hover { color: var(--accent-red); }

.empty-state { text-align: center; padding: 30px 0; color: var(--text-dim); font-family: 'Annie Use Your Telescope', cursive; font-size: 14px; }
.empty-state .empty-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.4; }

/* ══════════════════════════════════════════
   QUOTES
══════════════════════════════════════════ */
/* Quote body — Felipa script */
.quote-body {
  font-family: 'Felipa', cursive;
  font-size: 26px; line-height: 1.6;
  color: var(--text-bright); margin-bottom: 16px; min-height: 96px;
  transition: opacity 0.4s, color 0.45s;
}
.quote-author {
  font-family: 'Annie Use Your Telescope', cursive;
  font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--accent); transition: opacity 0.4s, color 0.45s;
}
.quote-nav { display: flex; justify-content: flex-end; gap: 6px; margin-top: 16px; }
.q-btn {
  width: 32px; height: 32px; border-radius: 9px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.q-btn:hover { border-color: var(--border-accent); color: var(--accent); }

/* ══════════════════════════════════════════
   TOAST
══════════════════════════════════════════ */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--bg-raised); border: 1px solid var(--border-accent);
  color: var(--text-bright); padding: 12px 28px; border-radius: 50px;
  font-family: 'Annie Use Your Telescope', cursive; font-size: 14px;
  letter-spacing: 0.05em; z-index: 100; white-space: nowrap;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), background 0.45s, color 0.45s;
}
.toast.show { transform: translateX(-50%) translateY(0); }

@keyframes ambientPulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(200,129,58,0); }
  50%      { box-shadow: 0 0 40px 4px rgba(200,129,58,0.07); }
}
.timer-card.running { animation: ambientPulse 4s ease infinite; }

/* ══════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════ */
@media (max-width: 1100px) { .app-grid { grid-template-columns: 1fr 1fr; } .timer-card { grid-column: 1 / -1; } }
@media (max-width: 700px)  { .app-grid { grid-template-columns: 1fr; } .timer-card { grid-column: 1; } header { padding: 14px 18px; } }

</style>
</head>
<body>

<header>
  <div class="logo">Sanctum<span>.</span></div>
  <div class="header-right">
    <span id="live-clock">--:-- --</span>
    <span style="color:var(--border)">|</span>
    <span id="date-display">--</span>
    <button class="theme-toggle" onclick="toggleTheme()">
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
      <span class="lbl-dark">Light</span>
      <span class="lbl-light">Dark</span>
    </button>
  </div>
</header>

<div class="app-grid">

  <!-- ────────── TODO ────────── -->
  <div class="card" style="grid-column:1;">
    <div class="card-title">⬡ Task List</div>
    <div class="todo-input-row">
      <input class="todo-input" id="todoInput" type="text" placeholder="Add a task…" maxlength="120" autocomplete="off">
      <button class="add-btn" onclick="addTodo()">+</button>
    </div>
    <div class="todo-filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('active',this)">Active</button>
      <button class="filter-btn" onclick="setFilter('done',this)">Done</button>
    </div>
    <div class="todo-list" id="todoList">
      <div class="empty-state" id="todoEmpty">
        <div class="empty-icon">✦</div>
        No tasks yet. Add one above.
      </div>
    </div>
    <div class="todo-stats">
      <span id="todoStats">0 tasks</span>
      <button class="clear-done" onclick="clearDone()">Clear done</button>
    </div>
  </div>

  <!-- ────────── POMODORO ────────── -->
  <div class="card timer-card" id="timerCard">
    <div class="card-title" style="width:100%;">⏱ Pomodoro Timer</div>

    <div class="timer-modes">
      <button class="mode-btn active" onclick="setMode('work',this)">Focus</button>
      <button class="mode-btn" onclick="setMode('short',this)">Short Break</button>
      <button class="mode-btn" onclick="setMode('long',this)">Long Break</button>
    </div>

    <div class="timer-ring-wrapper">
      <svg class="timer-ring-svg" viewBox="0 0 264 264">
        <circle class="ring-bg"       cx="132" cy="132" r="116"/>
        <circle class="ring-progress" id="ringProgress" cx="132" cy="132" r="116"
          stroke-dasharray="728.8" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-center">
        <div class="timer-display" id="timerDisplay">25:00</div>
        <div class="timer-label"   id="timerLabel">Focus Session</div>
        <div class="session-dots"  id="sessionDots"></div>
      </div>
    </div>

    <div class="timer-controls">
      <button class="btn-icon" onclick="skipSession()" title="Skip">⏭</button>
      <button class="btn-main" id="timerBtn" onclick="toggleTimer()">▶</button>
      <button class="btn-icon" onclick="resetTimer()" title="Reset">↺</button>
    </div>

    <div class="timer-settings">
      <div class="setting-box">
        <div class="setting-label">Focus</div>
        <div class="setting-value" id="setFocus">25</div>
        <div class="setting-controls">
          <button class="adj-btn" onclick="adjustTime('focus',-1)">−</button>
          <button class="adj-btn" onclick="adjustTime('focus',1)">+</button>
        </div>
      </div>
      <div class="setting-box">
        <div class="setting-label">Short Break</div>
        <div class="setting-value" id="setShort">5</div>
        <div class="setting-controls">
          <button class="adj-btn" onclick="adjustTime('short',-1)">−</button>
          <button class="adj-btn" onclick="adjustTime('short',1)">+</button>
        </div>
      </div>
      <div class="setting-box">
        <div class="setting-label">Long Break</div>
        <div class="setting-value" id="setLong">15</div>
        <div class="setting-controls">
          <button class="adj-btn" onclick="adjustTime('long',-1)">−</button>
          <button class="adj-btn" onclick="adjustTime('long',1)">+</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ────────── QUOTES ────────── -->
  <div style="grid-column:3;">
    <div class="card">
      <div class="card-title">✦ Wisdom</div>
      <div class="quote-body"   id="quoteText">"Loading…"</div>
      <div class="quote-author" id="quoteAuthor">—</div>
      <div class="quote-nav">
        <button class="q-btn" onclick="prevQuote()">←</button>
        <button class="q-btn" onclick="nextQuote()">→</button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ══════════════════════════════════
   THEME
══════════════════════════════════ */
function toggleTheme(){
  const next = document.documentElement.getAttribute('data-theme')==='dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('sanctum-theme', next);
}
(function(){ const s=localStorage.getItem('sanctum-theme'); if(s) document.documentElement.setAttribute('data-theme',s); })();

/* ══════════════════════════════════
   CLOCK
══════════════════════════════════ */
function updateClock(){
  const n=new Date();
  document.getElementById('live-clock').textContent =
    n.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
  document.getElementById('date-display').textContent =
    n.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
}
updateClock(); setInterval(updateClock, 1000);

/* ══════════════════════════════════
   POMODORO
══════════════════════════════════ */
const cfg = {focus:25, short:5, long:15};
let cMode='work', tLeft=cfg.focus*60, tTotal=cfg.focus*60;
let running=false, tInterval=null, sessions=0;
const CIRC = 2*Math.PI*116; // r=116 → 728.8
const modeLabels = {work:'Focus Session', short:'Short Break', long:'Long Break'};

function setMode(m, btn){
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); cMode=m;
  tTotal=(m==='work'?cfg.focus:m==='short'?cfg.short:cfg.long)*60;
  tLeft=tTotal; running=false; clearInterval(tInterval);
  document.getElementById('timerBtn').textContent='▶';
  document.getElementById('timerCard').classList.remove('running');
  document.getElementById('ringProgress').classList.toggle('break-mode', m!=='work');
  updateDisplay();
}

function toggleTimer(){ running ? pause() : start(); }

function start(){
  running=true;
  document.getElementById('timerBtn').textContent='⏸';
  document.getElementById('timerCard').classList.add('running');
  tInterval=setInterval(()=>{ tLeft<=0 ? sessionDone() : (tLeft--, updateDisplay()); }, 1000);
}

function pause(){
  running=false; clearInterval(tInterval);
  document.getElementById('timerBtn').textContent='▶';
  document.getElementById('timerCard').classList.remove('running');
}

function resetTimer(){ pause(); tLeft=tTotal; updateDisplay(); }
function skipSession(){ pause(); sessionDone(); }

function sessionDone(){
  clearInterval(tInterval); running=false;
  document.getElementById('timerCard').classList.remove('running');
  if(cMode==='work'){
    sessions++; buildDots();
    showToast('Focus session complete! Take a break 🎯');
    setTimeout(()=>autoSwitch(sessions%4===0?'long':'short'), 1200);
  } else {
    showToast('Break over — back to work! ⚡');
    setTimeout(()=>autoSwitch('work'), 1200);
  }
}

function autoSwitch(m){
  document.querySelectorAll('.mode-btn').forEach((b,i)=>
    b.classList.toggle('active', ['work','short','long'][i]===m));
  cMode=m;
  tTotal=(m==='work'?cfg.focus:m==='short'?cfg.short:cfg.long)*60;
  tLeft=tTotal;
  document.getElementById('ringProgress').classList.toggle('break-mode', m!=='work');
  document.getElementById('timerBtn').textContent='▶';
  updateDisplay();
}

function updateDisplay(){
  const m=String(Math.floor(tLeft/60)).padStart(2,'0');
  const s=String(tLeft%60).padStart(2,'0');
  document.getElementById('timerDisplay').textContent=`${m}:${s}`;
  document.getElementById('timerLabel').textContent=modeLabels[cMode];
  document.getElementById('ringProgress').style.strokeDashoffset=CIRC*(1-tLeft/tTotal);
  document.title=running ? `${m}:${s} — Sanctum` : 'SANCTUM';
}

function adjustTime(type, delta){
  cfg[type]=Math.max(1, Math.min(90, cfg[type]+delta));
  document.getElementById('set'+type.charAt(0).toUpperCase()+type.slice(1)).textContent=cfg[type];
  const map={focus:'work', short:'short', long:'long'};
  if(map[type]===cMode && !running){ tTotal=cfg[type]*60; tLeft=tTotal; updateDisplay(); }
}

function buildDots(){
  const c=document.getElementById('sessionDots'); c.innerHTML='';
  const f=sessions%4===0&&sessions>0?4:sessions%4;
  for(let i=0;i<4;i++){
    const d=document.createElement('div');
    d.className='session-dot'+(i<f?' done':'');
    c.appendChild(d);
  }
}

updateDisplay(); buildDots();

/* ══════════════════════════════════
   TODO
══════════════════════════════════ */
let todos=[], fil='all';

document.getElementById('todoInput').addEventListener('keydown', e=>{ if(e.key==='Enter') addTodo(); });

function addTodo(){
  const inp=document.getElementById('todoInput'), txt=inp.value.trim();
  if(!txt) return;
  todos.unshift({id:Date.now(), text:txt, done:false});
  inp.value=''; renderTodos();
}

function setFilter(f, btn){
  fil=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); renderTodos();
}

function toggleDone(id){ const t=todos.find(t=>t.id===id); if(t) t.done=!t.done; renderTodos(); }
function deleteTodo(id){ todos=todos.filter(t=>t.id!==id); renderTodos(); }
function clearDone(){ todos=todos.filter(t=>!t.done); renderTodos(); }

function renderTodos(){
  const list=document.getElementById('todoList');
  const empty=document.getElementById('todoEmpty');
  const flt=todos.filter(t=> fil==='all'?true: fil==='done'?t.done:!t.done);
  [...list.children].forEach(c=>{ if(c.id!=='todoEmpty') c.remove(); });
  if(!flt.length){ empty.style.display='block'; }
  else {
    empty.style.display='none';
    flt.forEach(t=>{
      const el=document.createElement('div');
      el.className=`todo-item${t.done?' done':''}`;
      el.innerHTML=`
        <div class="todo-check${t.done?' checked':''}" onclick="toggleDone(${t.id})">${t.done?'✓':''}</div>
        <div class="todo-text">${esc(t.text)}</div>
        <button class="todo-del" onclick="deleteTodo(${t.id})">✕</button>`;
      list.appendChild(el);
    });
  }
  const done=todos.filter(t=>t.done).length;
  document.getElementById('todoStats').textContent =
    todos.length===0 ? '0 tasks' : `${done}/${todos.length} complete`;
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

setInterval(()=>{ qIdx=(qIdx+1)%quotes.length; showQ(qIdx); }, 45000);
